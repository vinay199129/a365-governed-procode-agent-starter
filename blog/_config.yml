title: "Building a Governed Pro-Code Agent on Microsoft Agent 365"
description: >-
  A blog-style learning series that walks through the A365 Governed Pro-Code
  Agent Starter — from concepts and architecture to setup, code, and evidence.
  Every post links to runnable code in this repository so you can try it
  yourself.
author: A365 Starter Maintainers

# Set this to your GitHub Pages URL when deploying, e.g. /a365-governed-procode-agent-starter
baseurl: ""
url: ""

# Use the GitHub Pages-supported "minima" theme (no custom plugins required).
theme: minima
minima:
  skin: auto

# Show all posts on the index page.
show_excerpts: true
paginate: 10

# Markdown / syntax highlighting.
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Helpful defaults so every post has a consistent layout.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false

# Exclude files Jekyll shouldn't try to render.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
