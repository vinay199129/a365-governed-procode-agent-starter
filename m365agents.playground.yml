# yaml-language-server: $schema=https://aka.ms/m365-agents-toolkits/v1.11/yaml.schema.json
# Visit https://aka.ms/teamsfx-v5.0-guide for details on this file
# Visit https://aka.ms/teamsfx-actions for details on actions
version: v1.11

environmentFolderPath: ./env

deploy:
  # Install development tool(s)
  - uses: devTool/install
    with:
      testTool:
        version: ~0.2.7
        symlinkDir: ./devTools/playground
      nodejs:
        symlinkDir: ./devTools/nodejs

  # Install Python dependencies
  - uses: script
    with:
      run: uv pip install -e .

  - uses: file/createOrUpdateEnvironmentFile
    with:
      target: ./.env
      envs:
        PORT: 3978
        TEAMSFX_NOTIFICATION_STORE_FILENAME: ${{TEAMSFX_NOTIFICATION_STORE_FILENAME}}
        AZURE_OPENAI_API_KEY: ${{SECRET_AZURE_OPENAI_API_KEY}}
        AZURE_OPENAI_ENDPOINT: ${{AZURE_OPENAI_ENDPOINT}}
        AZURE_OPENAI_DEPLOYMENT: ${{AZURE_OPENAI_DEPLOYMENT_NAME}}
        # OPENAI_API_KEY: ${{SECRET_OPENAI_API_KEY}}
        BEARER_TOKEN: ${{SECRET_BEARER_TOKEN}}
        USE_AGENTIC_AUTH: ${{USE_AGENTIC_AUTH}}
        ENABLE_A365_OBSERVABILITY_EXPORTER: ${{ENABLE_A365_OBSERVABILITY_EXPORTER}}
        OBS_S2S_TOKEN: ${{SECRET_OBS_S2S_TOKEN}}
        # SDK service-connection config (UPPERCASE only — Windows env vars are
        # case-insensitive, so declaring lowercase aliases breaks debugpy launch).
        AGENT_ID: ${{AGENT_BLUEPRINT_ID}}
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTID: ${{AGENT_BLUEPRINT_ID}}
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTSECRET: ${{SECRET_AGENT_BLUEPRINT_CLIENT_SECRET}}
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__TENANTID: ${{AGENT_TENANT_ID}}
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__SCOPES: 5a807f24-c9de-44ee-a3a7-329e88a00ffc/.default
        AGENTAPPLICATION__USERAUTHORIZATION__HANDLERS__AGENTIC__SETTINGS__TYPE: AgenticUserAuthorization
        AGENTAPPLICATION__USERAUTHORIZATION__HANDLERS__AGENTIC__SETTINGS__ALT_BLUEPRINT_NAME: SERVICE_CONNECTION
        AGENTAPPLICATION__USERAUTHORIZATION__HANDLERS__AGENTIC__SETTINGS__SCOPES: https://graph.microsoft.com/.default
        CONNECTIONSMAP__0__SERVICEURL: "*"
        CONNECTIONSMAP__0__CONNECTION: SERVICE_CONNECTION
