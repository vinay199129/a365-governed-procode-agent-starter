name: pages

# Static-site Pages deployment. No build step — just upload the repo
# (minus heavy folders) so GitHub Pages serves index.html / docs.html /
# learning-series.html and the markdown files they fetch via JS.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        # Copy only what the static site needs into a clean folder so the
        # uploaded artifact is small and predictable.
        run: |
          mkdir _site
          cp -r index.html docs.html learning-series.html .nojekyll _site/
          cp -r assets _site/
          cp -r docs _site/
          cp -r posts _site/
          cp -r images _site/ 2>/dev/null || true
          cp README.md _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
