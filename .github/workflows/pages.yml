name: pages

# Build the Docusaurus site under /website and deploy it to GitHub Pages.
# Enable in repo Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "TROUBLESHOOTING.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys for the Pages environment.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) because the repo doesn't ship a
        # lockfile by default — first build will generate one.
        run: npm install --no-audit --no-fund

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
