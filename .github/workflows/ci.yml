name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies (frozen lock)
        run: uv sync --frozen --extra dev

      - name: Run pytest
        run: uv run pytest -q

      - name: Audit dependencies for known CVEs
        # uv.lock is the source of truth; pip-audit reads it via uv pip compile.
        # Non-blocking until a triage cadence is in place.
        continue-on-error: true
        run: uv run --with pip-audit pip-audit --strict || true

  pester:
    name: Pester (PowerShell 7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester 5
        shell: pwsh
        run: |
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck
          Get-Module -ListAvailable Pester | Select-Object Version, Path

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './scripts'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config
